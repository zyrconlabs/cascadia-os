<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PRISM — Cascadia OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--bg2:#f5f7fa;--surface:#f0f4f8;--surface2:#e8edf4;
  --border:rgba(0,0,0,0.07);--border-bright:rgba(0,0,0,0.14);
  --text:#0a0a0a;--text-dim:#4a5568;--text-faint:#94a3b8;
  --accent:#4facfe;--accent2:#00f2fe;
  --prism-a:#4facfe;--prism-b:#a78bfa;--prism-c:#34d399;--prism-d:#f472b6;
  --gold:#D4AF37;
  --navy-900:#111827;--navy-800:#374151;--navy-700:#4a5568;
  --navy-600:#4facfe;--navy-500:#4facfe;
  --navy-400:#94a3b8;--navy-300:#94a3b8;--navy-200:#e8edf4;
  --navy-100:#f0f4f8;--navy-50:#f5f7fa;
  --white:#ffffff;--gray-50:#f5f7fa;--gray-100:#f0f4f8;--gray-150:#e8edf4;
  --gray-200:#e8edf4;--gray-300:#94a3b8;--gray-400:#94a3b8;
  --gray-500:#4a5568;--gray-600:#0a0a0a;
  --green:#34d399;--green-soft:rgba(52,211,153,.12);--green-glow:rgba(52,211,153,.2);
  --red:#f87171;--red-soft:rgba(248,113,113,.1);
  --yellow:#D4AF37;--yellow-soft:rgba(212,175,55,.12);
  --purple:#a78bfa;--purple-soft:rgba(167,139,250,.1);
  --teal:#34d399;--teal-soft:rgba(52,211,153,.1);
  --font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono','SF Mono',monospace;
  --sidebar-w:280px;--topbar-h:52px;--nav-w:48px;--ease:cubic-bezier(.25,1,.5,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);-webkit-font-smoothing:antialiased;background:var(--white);color:var(--navy-900)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}
button{cursor:pointer;font-family:var(--font)}input,textarea,select{font-family:var(--font)}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;width:100%}
.nav-rail{width:var(--nav-w);min-width:var(--nav-w);background:#a78bfa;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;z-index:10}
.nav-logo{width:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:12px;gap:0}.nav-logo-text{font-size:9px;font-weight:800;letter-spacing:.18em;color:#fff;text-transform:uppercase;line-height:1}.nav-logo-bar{width:24px;height:2px;background:linear-gradient(90deg,var(--prism-a),var(--prism-b),var(--prism-c),var(--prism-d));border-radius:2px;margin-top:3px}
.nav-btn{width:36px;height:36px;border-radius:9px;border:none;background:transparent;color:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;flex-shrink:0}
.nav-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.nav-btn--active{background:rgba(255,255,255,.3);color:#fff}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-divider{width:24px;height:1px;background:rgba(255,255,255,.25);margin:4px 0}
.nav-tooltip{position:absolute;left:46px;background:#7c3aed;color:#fff;font-size:11px;font-weight:500;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100}
.nav-btn:hover .nav-tooltip{opacity:1}
.nav-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:1.5px solid #a78bfa}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;background:var(--gray-50);height:100vh}
.sidebar__header{height:var(--topbar-h);min-height:var(--topbar-h);display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--gray-200);gap:10px;background:#ffffff}
.sidebar__title{font-size:13px;font-weight:700;color:var(--navy-800)}
.sidebar__sub{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--gray-400);letter-spacing:.06em;margin-top:1px}
.sidebar__search{padding:10px 12px;border-bottom:1px solid var(--gray-150);background:#f5f7fa}
.sidebar__search input{width:100%;height:32px;border:1px solid var(--gray-200);border-radius:8px;padding:0 10px;font-size:12px;color:var(--navy-900);background:#fff;outline:none;transition:border-color .15s}
.sidebar__search input:focus{border-color:var(--navy-300)}
.sidebar__search input::placeholder{color:var(--gray-400)}
.sidebar__list{flex:1;overflow-y:auto;padding:4px 0}
.sidebar__section{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--gray-400);letter-spacing:.1em;text-transform:uppercase;padding:10px 16px 5px}
.sidebar__footer{padding:10px 12px;border-top:1px solid var(--gray-150);background:#f5f7fa}
.sidebar__add{width:100%;height:32px;border:1px dashed var(--gray-300);border-radius:8px;background:transparent;font-size:12px;color:var(--gray-500);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.sidebar__add:hover{border-color:var(--prism-a);color:var(--prism-a);background:rgba(79,172,254,.04)}

/* ── OPERATOR ITEMS ── */
.op-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--gray-100)}
.op-item:hover{background:var(--gray-100)}
.op-item--active{background:var(--white);box-shadow:inset 3px 0 0 var(--prism-a)}
.op-item--active:hover{background:var(--white)}
.op-item--beacon{border-bottom:2px solid var(--gray-200);padding:13px 16px}
.op-avatar{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;position:relative}
.op-avatar--beacon{background:linear-gradient(135deg,var(--prism-a),var(--prism-b));color:#fff;border-radius:50%}
.op-avatar--worker{background:#4a5568;color:#fff}
.op-avatar--operator{background:#4a5568;color:#fff}
.op-dot{position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;border:2px solid var(--gray-50)}
.op-item--active .op-dot{border-color:var(--white)}
.dot--online{background:var(--green);box-shadow:0 0 5px var(--green-glow)}
.dot--standby{background:var(--yellow)}
.dot--offline{background:var(--red)}
.op-body{flex:1;min-width:0}
.op-name{font-size:13px;font-weight:600;color:var(--navy-800)}
.op-role{font-size:11px;color:var(--gray-500);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-meta{display:flex;gap:5px;margin-top:4px;align-items:center;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:9.5px;font-weight:500;padding:2px 6px;border-radius:4px}
.tag--online{color:#1d7a3a;background:var(--green-soft)}.tag--standby{color:#8a6a0a;background:var(--yellow-soft)}.tag--offline{color:#a33029;background:var(--red-soft)}
.tag--neutral{color:var(--navy-500);background:var(--navy-50)}.tag--worker{color:var(--navy-700);background:var(--navy-100)}
.tag--preview{color:var(--purple);background:var(--purple-soft);font-size:9px}.tag--approval{color:#b85c00;background:rgba(212,160,23,.15)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0;background:var(--white);overflow-y:auto}
.main__empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.main__empty svg{width:40px;height:40px;stroke:var(--gray-400);fill:none;stroke-width:1.2}
.main__empty p{font-size:15px;font-weight:600;color:var(--navy-700)}.main__empty span{font-size:12px;color:var(--gray-500)}

/* ── TOP BAR ── */
.topbar{height:var(--topbar-h);min-height:var(--topbar-h);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--gray-200);flex-shrink:0;gap:10px}
.topbar__left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.topbar__avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:relative;flex-shrink:0}
.topbar__avatar--beacon{background:linear-gradient(135deg,var(--prism-a),var(--prism-b));color:#fff;border-radius:50%}
.topbar__avatar--worker{background:var(--navy-800);color:var(--white)}
.topbar__avatar--operator{background:var(--navy-100);color:var(--navy-600)}
.topbar__dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;border:1.5px solid var(--white)}
.topbar__name{font-size:15px;font-weight:700;color:var(--navy-800)}
.topbar__role{font-size:11px;color:var(--gray-500)}
.topbar__right{display:flex;align-items:center;gap:5px}
.hbtn{height:28px;display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:500;padding:0 9px;border-radius:7px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-500);transition:all .12s;letter-spacing:.04em;white-space:nowrap}
.hbtn:hover{background:var(--gray-100);color:var(--navy-600);border-color:var(--gray-300)}
.hbtn--active{background:var(--navy-50);color:var(--navy-700);border-color:var(--navy-200)}
.hbtn--danger:hover{color:var(--red);border-color:rgba(232,69,60,.3);background:var(--red-soft)}
.hbtn--popout{background:linear-gradient(135deg,rgba(79,172,254,.06),rgba(167,139,250,.06));border-color:rgba(167,139,250,.25);color:var(--prism-b)}
.hbtn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* ── WORKER PANEL ── */
.worker-panel{overflow:hidden;transition:max-height .35s var(--ease),opacity .25s;max-height:0;opacity:0;flex-shrink:0}
.worker-panel--open{max-height:240px;opacity:1}
.worker-panel__inner{padding:12px 20px 14px;border-bottom:1px solid var(--gray-150)}
.wp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.wp-title{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-500)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gray-400);flex-shrink:0}
.live-dot--run{background:var(--green);box-shadow:0 0 5px var(--green-glow);animation:pulseDot 1.5s ease-in-out infinite}
.live-dot--stop{background:var(--red)}
@keyframes pulseDot{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.wp-chips{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.wp-chip{display:flex;flex-direction:column;gap:2px}
.wp-chip__val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--navy-800);line-height:1}
.wp-chip__val--sm{font-size:12px;padding-top:2px}
.wp-chip__lbl{font-size:9.5px;color:var(--gray-500)}
.wp-controls{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.wp-btn{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid var(--gray-200);background:var(--white);color:var(--navy-600);transition:all .12s}
.wp-btn:hover{background:var(--gray-100)}.wp-btn--stop{border-color:rgba(232,69,60,.3);color:var(--red)}.wp-btn--stop:hover{background:var(--red-soft)}
.wp-log{font-family:var(--mono);font-size:9.5px;color:var(--gray-500);line-height:1.7;border-top:1px solid var(--gray-150);padding-top:6px}
.wp-log span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wp-log .linfo{color:var(--navy-500)}.wp-log .lwarn{color:var(--yellow)}.wp-log .lerr{color:var(--red)}

/* ── THOUGHT BUBBLES ── */
.thought{display:flex;align-items:flex-start;gap:7px;padding:6px 10px 6px 8px;background:var(--gray-50);border-left:2px solid var(--navy-200);border-radius:0 7px 7px 0;margin:2px 0 2px 32px;animation:msgIn .2s var(--ease);max-width:88%}
.thought__dot{width:4px;height:4px;border-radius:50%;background:var(--navy-400);margin-top:5px;flex-shrink:0}
.thought-search{border-left-color:var(--navy-300)}.thought-search .thought__dot{background:var(--navy-500)}
.thought-think{border-left-color:var(--yellow)}.thought-think .thought__dot{background:var(--yellow)}
.thought-write{border-left-color:var(--green)}.thought-write .thought__dot{background:var(--green)}
.thought-stop{border-left-color:var(--red)}.thought-stop .thought__dot{background:var(--red)}
.thought__text{font-family:var(--mono);font-size:10.5px;color:var(--navy-600);flex:1;line-height:1.5}
.thought__time{font-family:var(--mono);font-size:9px;color:var(--gray-400);white-space:nowrap;margin-left:6px;padding-top:1px;flex-shrink:0}

/* ── CHAT ── */
.chat-area{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-log{flex:1;overflow-y:auto;padding:14px 20px}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.chat-msg{display:flex;gap:8px;margin-bottom:10px;animation:msgIn .2s var(--ease)}
.msg-av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.msg-av--user{background:var(--navy-700);color:var(--white)}.msg-av--beacon{background:var(--navy-600);color:var(--white);border-radius:50%}
.msg-av--operator{background:var(--navy-100);color:var(--navy-600)}.msg-av--worker{background:var(--navy-800);color:var(--white)}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:7px;margin-bottom:2px}
.msg-name{font-size:12px;font-weight:600;color:var(--navy-800)}.msg-time{font-family:var(--mono);font-size:9.5px;color:var(--gray-400)}
.msg-text{font-size:13px;color:var(--navy-700);line-height:1.55;white-space:pre-wrap;word-break:break-word}

/* ── ACTIVITY BAR ── */
.act-bar{overflow:hidden;transition:all .3s var(--ease)}
.act-bar--hidden{max-height:0;padding:0 20px}.act-bar--visible{max-height:100px;padding:7px 20px;border-top:1px solid var(--gray-150)}
.act-bar__label{font-family:var(--mono);font-size:9.5px;font-weight:500;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.act-badges{display:flex;flex-wrap:wrap;gap:4px}
.act-badge{font-family:var(--mono);font-size:9.5px;font-weight:500;padding:2px 8px;border-radius:14px;background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-500);opacity:0;transform:translateY(2px);transition:all .22s}
.act-badge.vis{opacity:1;transform:translateY(0)}.act-badge.active{background:var(--green-soft);border-color:rgba(52,199,89,.2);color:#1d7a3a}
.scan-wrap{display:flex;align-items:center;gap:7px;margin-top:5px;height:10px}
.scan-track{flex:1;max-width:120px;height:2px;background:var(--gray-200);border-radius:2px;overflow:hidden;position:relative}
.scan-beam{position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--navy-400),transparent);animation:scanBeam 1.2s ease-in-out infinite}
@keyframes scanBeam{0%{left:-40%}100%{left:140%}}
.scan-dot{width:5px;height:5px;border-radius:50%;background:var(--navy-400);animation:pulseDot 1.2s ease-in-out infinite}
.standby-pulse{display:flex;align-items:center;gap:7px;padding:8px 0}
.standby-ring{width:9px;height:9px;border-radius:50%;background:var(--yellow);animation:standbyBreath 2.5s ease-in-out infinite}
@keyframes standbyBreath{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
.standby-text{font-family:var(--mono);font-size:10px;color:var(--gray-400)}

/* ── INFO STRIP ── */
.info-strip{display:flex;gap:16px;padding:10px 20px;border-bottom:1px solid var(--gray-150);flex-shrink:0;flex-wrap:wrap}
.chip{display:flex;flex-direction:column}.chip__val{font-size:17px;font-weight:700;color:var(--navy-800);line-height:1}.chip__lbl{font-size:10px;color:var(--gray-500);margin-top:2px}
.chip--bar{flex:1;min-width:80px;justify-content:center}
.mini-prog{width:100%;height:3px;background:var(--gray-150);border-radius:2px;overflow:hidden;margin-top:6px}
.mini-prog__fill{height:100%;background:linear-gradient(90deg,var(--prism-a),var(--prism-b));border-radius:2px;transition:width .6s var(--ease)}

/* ── INPUT ── */
.chat-input-area{padding:8px 20px 14px}
.chat-input-wrap{border:1.5px solid var(--gray-200);border-radius:16px;background:var(--white);transition:border-color .15s,box-shadow .15s}
.chat-input-wrap:focus-within{border-color:var(--navy-300);box-shadow:0 0 0 3px rgba(61,90,138,.05)}
.chat-input-wrap textarea{width:100%;border:none;outline:none;font-size:13px;color:var(--navy-900);background:transparent;resize:none;height:44px;max-height:180px;line-height:24px;padding:12px 14px 4px}
.chat-input-wrap textarea::placeholder{color:var(--gray-400)}
.chat-toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 8px}
.chat-toolbar__left,.chat-toolbar__right{display:flex;align-items:center;gap:3px}
.tb-btn{width:28px;height:28px;border-radius:7px;border:none;background:transparent;color:var(--gray-400);display:flex;align-items:center;justify-content:center;transition:all .12s}
.tb-btn:hover{background:var(--gray-100);color:var(--navy-600)}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-btn--send{background:linear-gradient(135deg,var(--prism-a),var(--prism-b));color:#fff;border-radius:8px;width:30px;height:30px}
.tb-btn--send:hover{opacity:.85}.tb-btn--status-on{color:var(--green);background:var(--green-soft)}
.model-sel{position:relative}
.model-btn{height:26px;display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:500;padding:0 8px;border-radius:7px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-500);transition:all .12s}
.model-btn:hover{background:var(--gray-100);color:var(--navy-600)}
.model-dd{position:absolute;bottom:34px;right:0;background:var(--white);border:1px solid var(--gray-200);border-radius:10px;padding:4px;min-width:180px;box-shadow:0 4px 16px rgba(0,0,0,.08);display:none;z-index:50}
.model-dd.open{display:block}
.model-opt{padding:7px 10px;border-radius:7px;cursor:pointer;transition:background .1s;font-size:12px;color:var(--navy-800)}
.model-opt:hover{background:var(--gray-100)}.model-opt--active{background:var(--navy-50);color:var(--navy-700)}
.model-opt span{font-family:var(--mono);font-size:10px;color:var(--gray-400);display:block;margin-top:1px}

/* ── START AREA ── */
.start-area{display:flex;flex-direction:column;align-items:center;padding:6px 20px;flex-shrink:0}
.start-btn{font-size:12px;font-weight:600;padding:7px 22px;border-radius:18px;border:1.5px solid var(--navy-200);background:var(--white);color:var(--navy-600);display:flex;align-items:center;gap:5px;transition:all .15s}
.start-btn:hover{background:var(--navy-50);border-color:var(--navy-300)}
.start-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}
.cmd-menu{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;justify-content:center;overflow:hidden;transition:all .2s var(--ease)}
.cmd-menu--hidden{max-height:0;margin:0;opacity:0;pointer-events:none}
.cmd-btn{font-family:var(--mono);font-size:10px;font-weight:500;padding:5px 12px;border-radius:7px;border:1px solid var(--gray-200);background:var(--white);color:var(--navy-600);transition:all .12s}
.cmd-btn:hover{background:var(--navy-50);border-color:var(--navy-300)}

/* ── STATUS CARDS ── */
.status-card{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--gray-50);border:1px solid var(--gray-150);border-radius:9px;opacity:0;transform:translateY(5px);animation:cardIn .3s var(--ease) forwards}
.sc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.sc-dot--g{background:var(--green);box-shadow:0 0 5px var(--green-glow)}.sc-dot--y{background:var(--yellow)}.sc-dot--r{background:var(--red)}
.sc-info{flex:1;min-width:0}.sc-name{font-size:12px;font-weight:600;color:var(--navy-800)}.sc-task{font-size:10px;color:var(--gray-500);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-pct{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--navy-600)}
.wsc{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:12px 14px;margin-top:4px;animation:cardIn .3s var(--ease)}
.wsc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.wsc-title{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-500);display:flex;align-items:center;gap:6px}
.wsc-chips{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.wsc-chip{display:flex;flex-direction:column;gap:2px}.wsc-chip__val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--navy-800)}.wsc-chip__lbl{font-size:9.5px;color:var(--gray-500)}
.wsc-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.wsc-btn{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid var(--gray-200);background:var(--white);color:var(--navy-600);transition:all .12s}
.wsc-btn:hover{background:var(--gray-100)}.wsc-btn--stop{color:var(--red);border-color:rgba(232,69,60,.3)}.wsc-btn--stop:hover{background:var(--red-soft)}

/* ── INGESTION ── */
.ingest-progress{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:9px;padding:10px 12px;margin-top:6px;animation:cardIn .25s var(--ease)}
.ingest-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ingest-icon{font-size:14px}.ingest-name{font-size:12px;font-weight:600;color:var(--navy-800);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ingest-stage{font-family:var(--mono);font-size:9.5px;color:var(--gray-400)}
.ingest-bar{height:3px;background:var(--gray-200);border-radius:2px;overflow:hidden;margin-bottom:6px}
.ingest-bar__fill{height:100%;background:linear-gradient(90deg,var(--prism-a),var(--prism-c));border-radius:2px;transition:width .5s var(--ease)}
.ingest-stats{display:flex;gap:10px;font-family:var(--mono);font-size:9.5px;color:var(--gray-400)}

/* ══ RUNS ══ */
.surface{flex:1;overflow-y:auto;padding:16px 20px}
.runs-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sfil{height:30px;border:1px solid var(--gray-200);border-radius:7px;padding:0 10px;font-size:12px;color:var(--navy-900);background:var(--white);outline:none;transition:border-color .15s}
.sfil:focus{border-color:var(--navy-300)}
.runs-empty{padding:40px;text-align:center;color:var(--gray-400);font-size:13px}
.run-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--gray-150);border-radius:9px;background:var(--white);margin-bottom:6px;cursor:pointer;transition:all .12s;animation:msgIn .2s var(--ease)}
.run-row:hover{border-color:rgba(79,172,254,.3);background:rgba(79,172,254,.04)}
.run-row--active{border-color:rgba(79,172,254,.4);background:rgba(79,172,254,.05)}
.run-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.run-status--done{background:var(--green)}.run-status--run{background:var(--yellow);animation:pulseDot 1.2s infinite}.run-status--fail{background:var(--red)}.run-status--pend{background:var(--gray-400)}
.run-info{flex:1;min-width:0}
.run-title{font-size:12px;font-weight:600;color:var(--navy-800)}
.run-meta{font-family:var(--mono);font-size:10px;color:var(--gray-400);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.run-cost{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--navy-600);flex-shrink:0}
.run-detail{background:var(--gray-50);border:1px solid var(--gray-150);border-radius:10px;padding:14px;margin-bottom:10px;animation:cardIn .25s var(--ease)}
.run-detail__title{font-size:13px;font-weight:600;color:var(--navy-800);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.run-timeline{display:flex;flex-direction:column;gap:0}
.rt-event{display:flex;align-items:flex-start;gap:10px;position:relative;padding-bottom:8px}
.rt-event:last-child{padding-bottom:0}
.rt-event::before{content:'';position:absolute;left:11px;top:22px;width:1px;height:calc(100% - 10px);background:var(--gray-200)}
.rt-event:last-child::before{display:none}
.rt-icon{width:22px;height:22px;border-radius:50%;background:var(--white);border:1.5px solid var(--gray-200);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;z-index:1}
.rt-icon--done{border-color:var(--green);background:var(--green-soft)}.rt-icon--fail{border-color:var(--red);background:var(--red-soft)}.rt-icon--run{border-color:var(--navy-300);background:var(--navy-50)}.rt-icon--tool{border-color:var(--purple);background:var(--purple-soft)}
.rt-label{font-size:11px;font-weight:600;color:var(--navy-800)}.rt-sub{font-family:var(--mono);font-size:10px;color:var(--gray-400);margin-top:1px}

/* ══ OBSERVABILITY ══ */
.obs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.obs-card{background:var(--gray-50);border:1px solid var(--gray-150);border-radius:10px;padding:12px 14px}
.obs-card__val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--navy-800);line-height:1}
.obs-card__label{font-size:10px;color:var(--gray-500);margin-top:3px}
.obs-card__sub{font-family:var(--mono);font-size:9.5px;color:var(--gray-400);margin-top:4px}
.obs-card--green .obs-card__val{color:#1d7a3a}.obs-card--red .obs-card__val{color:var(--red)}.obs-card--yellow .obs-card__val{color:var(--yellow)}
.obs-chart{background:var(--gray-50);border:1px solid var(--gray-150);border-radius:10px;padding:14px;margin-bottom:10px}
.obs-chart__title{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:11px;color:var(--navy-600);width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:var(--gray-150);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s var(--ease);background:var(--prism-a)}
.bar-fill--green{background:var(--green)}.bar-fill--yellow{background:var(--yellow)}
.bar-val{font-family:var(--mono);font-size:10px;color:var(--gray-500);width:50px;text-align:right;flex-shrink:0}
.obs-log{background:var(--navy-900);border-radius:10px;padding:14px;font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.6);line-height:1.8;max-height:160px;overflow-y:auto}
.obs-log .lok{color:var(--green)}.obs-log .lwarn{color:var(--yellow)}.obs-log .lerr{color:var(--red)}.obs-log .linfo{color:rgba(255,255,255,.45)}

/* ══ APPROVALS ══ */
.approval-card{background:var(--white);border:1px solid var(--gray-200);border-radius:10px;padding:14px;margin-bottom:10px;animation:cardIn .25s var(--ease)}
.approval-card--high{border-left:3px solid var(--red)}.approval-card--medium{border-left:3px solid var(--yellow)}.approval-card--low{border-left:3px solid var(--green)}
.approval-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.approval-title{font-size:13px;font-weight:600;color:var(--navy-800)}
.approval-risk{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;flex-shrink:0}
.risk--high{color:#a33029;background:var(--red-soft)}.risk--medium{color:#8a6a0a;background:var(--yellow-soft)}.risk--low{color:#1d7a3a;background:var(--green-soft)}
.approval-summary{font-size:12px;color:var(--gray-600);line-height:1.5;margin-bottom:10px}
.approval-payload{background:var(--gray-50);border:1px solid var(--gray-150);border-radius:7px;padding:10px;font-family:var(--mono);font-size:10.5px;color:var(--navy-600);margin-bottom:10px;white-space:pre-wrap;word-break:break-all}
.approval-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.approval-meta span{font-family:var(--mono);font-size:10px;color:var(--gray-400)}
.approval-actions{display:flex;gap:6px;flex-wrap:wrap}
.appr-btn{font-family:var(--mono);font-size:10px;font-weight:500;padding:5px 14px;border-radius:7px;border:1px solid var(--gray-200);background:var(--white);color:var(--navy-600);transition:all .12s}
.appr-btn--approve{background:var(--green-soft);border-color:rgba(52,199,89,.3);color:#1d7a3a}.appr-btn--approve:hover{background:rgba(52,199,89,.2)}
.appr-btn--reject{background:var(--red-soft);border-color:rgba(232,69,60,.3);color:var(--red)}.appr-btn--reject:hover{background:rgba(232,69,60,.2)}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;animation:livepulse 2s ease-in-out infinite;vertical-align:middle}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--green-glow)}50%{opacity:.6;box-shadow:0 0 0 5px transparent}}
.run-live-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--gray-150);border-radius:9px;background:var(--white);margin-bottom:6px}
.rls-badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0}
.rls-running{background:rgba(79,172,254,.12);color:var(--prism-a)}
.rls-waiting_human{background:rgba(212,175,55,.14);color:var(--yellow)}
.rls-complete{background:var(--green-soft);color:var(--green)}
.rls-failed{background:var(--red-soft);color:var(--red)}
.rls-blocked{background:rgba(167,139,250,.12);color:var(--purple)}
.rls-pending{background:var(--surface);color:var(--gray-500)}
.prism-live-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11px;color:var(--gray-400);font-family:var(--mono)}
.approval-live-card{background:var(--white);border:1px solid rgba(212,175,55,.4);border-radius:9px;padding:14px;margin-bottom:8px}
.approval-live-meta{font-size:10px;color:var(--gray-400);font-family:var(--mono);margin:4px 0 10px}
.approvals-empty{padding:40px;text-align:center;color:var(--gray-400);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px}
.approvals-empty svg{width:32px;height:32px;stroke:var(--gray-300);fill:none;stroke-width:1.5}

/* ══ STUDIO ══ */
.studio-surface{flex:1;display:flex;flex-direction:column;min-height:0}
.studio-toolbar{display:flex;align-items:center;gap:6px;padding:8px 16px;border-bottom:1px solid var(--gray-200);flex-shrink:0;flex-wrap:wrap}
.studio-toolbar__title{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--gray-500);letter-spacing:.06em;text-transform:uppercase;flex:1}
.studio-canvas{flex:1;display:flex;overflow:hidden}
.studio-palette{width:190px;min-width:190px;border-right:1px solid var(--gray-200);background:var(--gray-50);overflow-y:auto;padding:8px}
.palette-section{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--gray-400);letter-spacing:.1em;text-transform:uppercase;padding:8px 4px 5px}
.palette-node{display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid var(--gray-200);border-radius:8px;background:var(--white);cursor:grab;transition:all .12s;margin-bottom:5px;font-size:12px;color:var(--navy-700);font-weight:500;user-select:none}
.palette-node:hover{border-color:var(--navy-200);background:var(--navy-50)}
.palette-node:active{cursor:grabbing}
.palette-node__icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.pn--worker{background:var(--navy-100)}.pn--model{background:var(--purple-soft)}.pn--tool{background:var(--teal-soft)}.pn--control{background:var(--yellow-soft)}.pn--output{background:var(--green-soft)}
.studio-flow{flex:1;position:relative;overflow:hidden;background:var(--gray-50);cursor:default}
.studio-grid{position:absolute;inset:0;background-image:radial-gradient(circle,var(--gray-300) 1px,transparent 1px);background-size:24px 24px;opacity:.4;pointer-events:none}
.flow-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.flow-node{position:absolute;background:var(--white);border:1.5px solid var(--gray-200);border-radius:10px;padding:10px 12px;min-width:140px;cursor:pointer;transition:border-color .15s,box-shadow .15s;user-select:none}
.flow-node:hover{border-color:var(--navy-300)}
.flow-node--selected{border-color:var(--prism-a);box-shadow:0 0 0 3px rgba(79,172,254,.12)}
.flow-node--dragging{border-color:var(--navy-400);box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:100;transition:none}
.flow-node__header{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.flow-node__icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.flow-node__name{font-size:12px;font-weight:600;color:var(--navy-800)}
.flow-node__role{font-size:10px;color:var(--gray-500)}
.flow-node__port{width:10px;height:10px;border-radius:50%;background:var(--gray-200);border:1.5px solid var(--gray-300);position:absolute;transition:all .15s}
.flow-node__port:hover{background:var(--navy-400);border-color:var(--navy-400)}
.flow-node__port--in{left:-6px;top:50%;transform:translateY(-50%)}
.flow-node__port--out{right:-6px;top:50%;transform:translateY(-50%)}
.studio-inspector{width:230px;min-width:230px;border-left:1px solid var(--gray-200);background:var(--white);overflow-y:auto;padding:14px}
.inspector-title{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin-bottom:12px}
.inspector-field{margin-bottom:10px}
.inspector-label{font-size:11px;font-weight:500;color:var(--navy-700);margin-bottom:4px}
.inspector-input{width:100%;height:30px;border:1px solid var(--gray-200);border-radius:7px;padding:0 9px;font-size:12px;color:var(--navy-900);outline:none;transition:border-color .15s}
.inspector-input:focus{border-color:var(--navy-300)}
.inspector-select{width:100%;height:30px;border:1px solid var(--gray-200);border-radius:7px;padding:0 9px;font-size:12px;color:var(--navy-900);outline:none;background:var(--white)}
.inspector-textarea{width:100%;height:70px;border:1px solid var(--gray-200);border-radius:7px;padding:8px 9px;font-size:12px;color:var(--navy-900);outline:none;resize:none;line-height:1.5}
.inspector-textarea:focus{border-color:var(--navy-300)}
.inspector-empty{color:var(--gray-400);font-size:12px;text-align:center;padding:20px 0;line-height:1.6}
.flow-test-result{background:var(--gray-50);border:1px solid var(--gray-150);border-radius:7px;padding:8px 10px;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--navy-700);white-space:pre-wrap;max-height:80px;overflow-y:auto}

/* ══ ADMIN ══ */
.admin-section{margin-bottom:20px}
.admin-section__title{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-500);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gray-150)}
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{font-family:var(--mono);font-size:9.5px;font-weight:500;color:var(--gray-400);letter-spacing:.06em;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid var(--gray-150)}
.admin-table td{font-size:12px;color:var(--navy-700);padding:9px 10px;border-bottom:1px solid var(--gray-100)}
.admin-table tr:last-child td{border-bottom:none}.admin-table tr:hover td{background:var(--gray-50)}
.admin-role-badge{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px}
.role--admin{background:rgba(232,69,60,.12);color:var(--red)}.role--operator{background:var(--navy-50);color:var(--navy-600)}.role--builder{background:var(--purple-soft);color:var(--purple)}.role--viewer{background:var(--gray-100);color:var(--gray-500)}
.audit-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:11px}
.audit-row:last-child{border-bottom:none}
.audit-icon{width:20px;height:20px;border-radius:5px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.audit-info{flex:1}.audit-action{font-weight:600;color:var(--navy-800)}.audit-actor{color:var(--gray-500);font-size:10px;margin-top:1px}
.audit-time{font-family:var(--mono);font-size:9.5px;color:var(--gray-400);flex-shrink:0}
.api-key-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:12px}
.api-key-row:last-child{border-bottom:none}
.api-key-name{font-weight:600;color:var(--navy-800);flex:1}
.api-key-val{font-family:var(--mono);font-size:10px;color:var(--gray-400);background:var(--gray-100);padding:2px 8px;border-radius:4px}
.api-key-date{font-family:var(--mono);font-size:10px;color:var(--gray-400)}
.gw-contract{background:var(--navy-900);border-radius:10px;padding:14px;font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.7);line-height:1.8}
.gw-endpoint{color:rgba(255,255,255,.9);font-weight:500}
.gw-ok{color:var(--green)}.gw-miss{color:var(--yellow)}.gw-fail{color:var(--red)}
input[type="file"]{display:none}
.spacer{flex:1}
.badge-preview{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;background:var(--purple-soft);color:var(--purple);font-weight:500}

/* ── OPERATOR CARDS ── */
.op-section{padding:8px 16px 4px;font-family:var(--mono);font-size:9px;font-weight:500;color:var(--gray-400);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.op-count{font-size:9px;color:var(--gray-400);font-family:var(--mono)}
.op-card{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--gray-100);transition:background .12s;text-decoration:none}
.op-card:hover{background:var(--gray-100)}
.op-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff;position:relative}
.op-icon--intelligence{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.op-icon--sales{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.op-icon--executive{background:linear-gradient(135deg,#fa709a,#fee140)}
.op-icon--inbound{background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
.op-icon--engineering{background:linear-gradient(135deg,#f093fb,#f5576c)}
.op-body{flex:1;min-width:0}
.op-name{font-size:12px;font-weight:600;color:var(--navy-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-desc{font-size:10px;color:var(--gray-500);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.op-badge{font-size:8.5px;font-family:var(--mono);padding:1px 5px;border-radius:3px;font-weight:500}
.op-badge--production{background:rgba(52,211,153,.15);color:#059669}
.op-badge--beta{background:rgba(167,139,250,.15);color:#7c3aed}
.op-badge--online{background:rgba(52,211,153,.15);color:#059669}
.op-badge--offline{background:rgba(248,113,113,.12);color:#dc2626}
.op-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.op-dot--online{background:var(--green);box-shadow:0 0 4px var(--green-glow)}
.op-dot--offline{background:var(--gray-300)}

/* ── HEALTH SURFACE ── */
.health-summary{display:flex;align-items:center;gap:14px;padding:24px 28px 16px;flex-shrink:0}

.hc-group{font-size:10px;font-weight:700;color:var(--gray-500);letter-spacing:.08em;

.hc{display:flex;align-items:center;gap:12px;padding:10px 8px;

.hc-ok{background:rgba(52,211,153,.15);color:#059669}
.hc-warn{background:rgba(251,191,36,.15);color:#d97706}
.hc-err{background:rgba(248,113,113,.15);color:#dc2626}
.hc-spin{background:var(--gray-100);color:var(--gray-400);

.hc-lbl{font-size:12px;font-weight:600;color:var(--navy-800);line-height:1.3}

.hc-badge{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:700;

.alm-overlay{position:fixed;bottom:20px;right:20px;width:360px;max-height:520px;

  pointer-events:none;transition:transform .2s ease,opacity .2s ease}

.alm-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--gray-100);flex-shrink:0}
.alm-title{font-size:13px;font-weight:700;color:var(--navy-800)}

<script>
'use strict';

/* ═══════════════════════════════════════════════
   PRISM GATEWAY CONTRACT v1
   All backend calls go through GatewayContract.
   Swap kernels by replacing this object's impls.
   ════════════════════════════════════════════ */
let GW = 'http://127.0.0.1:4011'; // FLINT LLM proxy — always available when Cascadia runs, updated from /api/prism/models
const PRISM_URL = window.location.origin; // Always same origin as serving host — no CORS issues

async function prismFetch(path) {
  try {
    const r = await fetch(PRISM_URL + path, {signal: AbortSignal.timeout(4000)});
    if (r.ok) return r.json();
  } catch(_) {}
  return null;
}
const POLL = 5000;

const GatewayContract = {
  // ── System ──
  async getStatus() { return gw('GET', '/api/status'); },
  async getOperators() { return gw('GET', '/api/operators'); },

  // ── Chat ──
  async streamChat(messages, model, onToken, onDone) {
    try {
      const resp = await fetch(GW + '/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({model: model||S.model||'qwen2.5-3b-instruct-q4_k_m.gguf', messages, stream:true, temperature:0.7, max_tokens:600}),
      });
      const reader = resp.body.getReader(); const decoder = new TextDecoder();
      let full='', buf='', done=false;
      while (!done) {
        const r = await reader.read(); done = r.done;
        if (r.value) buf += decoder.decode(r.value, {stream:!done});
        const lines = buf.split('\n'); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') { done=true; break; }
          try { const t = JSON.parse(raw).choices?.[0]?.delta?.content; if (t) { full+=t; onToken(t,full); } } catch(_){}
        }
      }
      onDone(full);
    } catch(e) { onDone('⚠ Could not reach ' + (S.selected||'operator') + '. Check System Health tab or run: bash start.sh'); }
  },

  // ── Models ──
  async getModels() { return gw('GET', '/api/models'); },
  async switchModel(file) { return gw('POST', '/api/model/switch', {model:file}); },

  // ── Workers ──
  async getWorkerStatus(id) {
    const port = S.operators.find(x=>x.id===id)?.port;
    if (port) { try { const r=await fetch(`http://127.0.0.1:${port}/api/status`,{signal:AbortSignal.timeout(3000)}); return r.ok?await r.json():null; } catch(e){} }
    return gw('GET', `/api/workers/${id}/status`);
  },
  async getWorkerThoughts(id) {
    const port = S.operators.find(x=>x.id===id)?.port;
    if (port) { try { const r=await fetch(`http://127.0.0.1:${port}/api/thoughts`,{signal:AbortSignal.timeout(3000)}); return r.ok?await r.json():null; } catch(e){} }
    return null;
  },
  async stopWorker(id) {
    const port = S.operators.find(x=>x.id===id)?.port;
    if (port) { try { await fetch(`http://127.0.0.1:${port}/api/stop`,{method:'POST',signal:AbortSignal.timeout(3000)}); } catch(e){} }
    return gw('POST', `/api/workers/${id}/stop`);
  },
  async sendWorkerCommand(id, cmd, args) { return gw('POST', `/api/workers/${id}/command`, {cmd, args}); },

  // ── Runs ──
  async getRuns(workerId) { return gw('GET', `/api/runs?workerId=${workerId||''}`); },
  async getRunEvents(runId) { return gw('GET', `/api/runs/${runId}/events`); },

  // ── Costs / Metrics ──
  async getCostSummary() { return gw('GET', '/api/costs/summary'); },
  async getMetrics() { return gw('GET', '/api/metrics/summary'); },

  // ── Approvals ──
  async getApprovals() { return gw('GET', '/approvals'); },
  async resolveApproval(id, decision, comment) { return gw('POST', `/approvals/${id}/${decision}`, {comment}); },

  // ── Contract health check ──
  async checkContract() {
    const endpoints = [
      {name:'GET /api/status', fn: () => gw('GET','/api/status')},
      {name:'GET /api/operators', fn: () => gw('GET','/api/operators')},
      {name:'GET /api/models', fn: () => gw('GET','/api/models')},
      {name:'POST /v1/chat/completions', fn: () => fetch(GW+'/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:S.model||'qwen2.5-3b-instruct-q4_k_m.gguf',messages:[{role:'user',content:'ping'}],max_tokens:1}),signal:AbortSignal.timeout(3000)}).then(r=>r.ok?{ok:true}:null)},
    ];
    const results = [];
    for (const ep of endpoints) {
      try { const r = await ep.fn(); results.push({name:ep.name, ok:!!r}); }
      catch(_) { results.push({name:ep.name, ok:false}); }
    }
    return results;
  },
};

async function gw(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}, signal:AbortSignal.timeout(8000)};
  if (body) opts.body = JSON.stringify(body);
  try { const r = await fetch(GW+path, opts); if (r.ok) return r.json(); } catch(_){}
  return null;
}

/* ═══ MODELS — loaded dynamically from /api/prism/models ═══ */
let MODELS = [
  {id:'qwen2.5-3b', name:'Qwen 2.5 3B', desc:'3B · Fast · Local', file:'qwen2.5-3b-instruct-q4_k_m.gguf'},
  {id:'qwen2.5-7b', name:'Qwen 2.5 7B', desc:'7B · Balanced · Local', file:'qwen2.5-7b-instruct-q4_k_m.gguf'},
  {id:'qwen2.5-14b', name:'Qwen 2.5 14B', desc:'14B · Powerful · Local', file:'Qwen2.5-14B-Instruct-Q4_K_M.gguf'},
  {id:'qwen2.5-vl-7b', name:'Qwen 2.5 VL 7B', desc:'7B · Vision · Local', file:'qwen2.5-vl-7b-instruct-q4_k_m.gguf'},
];

async function loadModelsFromPRISM() {
  try {
    const data = await prismFetch('/api/prism/models');
    if (data && Array.isArray(data.models) && data.models.length) {
      MODELS = data.models.map(m => ({
        id:   m.id,
        name: m.name,
        desc: m.desc || (m.size ? m.size + ' · Local' : 'Local'),
        file: m.file || m.alias || null,
      }));
      // Set active model from config
      if (data.active_model_id && MODELS.find(m => m.id === data.active_model_id)) {
        S.model = data.active_model_id;
      } else if (MODELS.length) {
        S.model = MODELS[0].id;
      }

/* ═══ VAULT (IndexedDB — v3 schema) ═══ */
const Vault = (() => {
  let db = null;
  async function open() {
    if (db) return db;
    return new Promise((res,rej) => {
      const req = indexedDB.open('prism_vault_v3', 1);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        ['messages','runs','files','apiKeys','auditLog'].forEach(store => {
          if (!d.objectStoreNames.contains(store)) {
            const s = d.createObjectStore(store, {keyPath:'id', autoIncrement: store!=='messages'&&store!=='runs'&&store!=='files'&&store!=='apiKeys'&&store!=='auditLog' ? false : true});
            if (store==='runs') s.createIndex('workerId','workerId',{unique:false});
          }
        });
        if (!d.objectStoreNames.contains('kv')) d.createObjectStore('kv',{keyPath:'key'});
      };
      req.onsuccess = e => { db=e.target.result; res(db); };
      req.onerror = () => rej(req.error);
    });
  }
  async function tx(storeName, mode, fn) {
    const d = await open();
    return new Promise((res,rej) => {
      const t = d.transaction(storeName, mode);
      const store = t.objectStore(storeName);
      const req = fn(store);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function getAll(store) {
    const d = await open();
    return new Promise((res,rej) => {
      const t = d.transaction(store,'readonly');
      const req = t.objectStore(store).getAll();
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function clearStore(storeName) {
    const d = await open();
    return new Promise((res,rej) => {
      const t = d.transaction(storeName,'readwrite');
      const req = t.objectStore(storeName).clear();
      req.onsuccess = () => res();
      req.onerror = () => rej(req.error);
    });
  }
  return {
    async saveMessages(operatorId, msgs) { await tx('kv','readwrite', s => s.put({key:'msgs_'+operatorId, value:msgs})); },
    async loadMessages(operatorId) { const r = await tx('kv','readonly', s => s.get('msgs_'+operatorId)); return r?.value||null; },
    async saveRun(run) {
      await tx('runs','readwrite', s => s.put(run));
      if (!S.runs[run.workerId]) S.runs[run.workerId]=[];
      const idx = S.runs[run.workerId].findIndex(r=>r.id===run.id);
      if (idx>=0) S.runs[run.workerId][idx]=run; else S.runs[run.workerId].unshift(run);
    },
    async loadAllRuns() { return getAll('runs'); },
    async saveFile(f) { await tx('files','readwrite', s => s.put(f)); },
    async loadFiles() { return getAll('files'); },
    async saveApiKey(k) { await tx('apiKeys','readwrite', s => s.put(k)); },
    async loadApiKeys() { return getAll('apiKeys'); },
    async appendAuditEvent(ev) { await tx('auditLog','readwrite', s => s.put(ev)); S.auditLog.unshift(ev); },
    async loadAuditLog() { const all = await getAll('auditLog'); return all.sort((a,b)=>b.ts-a.ts).slice(0,50); },
    // Real vault clear — touches IndexedDB stores
    async clearAll() {
      await Promise.all(['kv','runs','files','auditLog'].map(clearStore));
      S.messages={}; S.runs={};
      await this.appendAuditEvent({id:'audit_'+Date.now(), ts:Date.now(), icon:'⚠', action:'Vault cleared', actor:'admin', time:timeNow()});
    },
    async exportAll() {
      const [runs,files,keys,audit] = await Promise.all([getAll('runs'),getAll('files'),getAll('apiKeys'),getAll('auditLog')]);
      return {version:'prism_vault_v3', exportedAt:new Date().toISOString(), messages:S.messages, runs, files, keys, auditLog:audit};
    },
    async stats() {
      const [runs,files,keys] = await Promise.all([getAll('runs'),getAll('files'),getAll('apiKeys')]);
      let msgCount=0;
      for (const id of Object.keys(S.messages)) msgCount+=(S.messages[id]||[]).length;
      return {messages:msgCount, runs:runs.length, files:files.length, keys:keys.length};
    },
  };
})();

/* ═══ INGESTION ═══ */
const INGEST_STAGES = ['uploading','parsing','chunking','embedding','indexing','ready'];
async function ingestFile(file, operatorId) {
  const fileId = 'file_'+Date.now();
  const ext = file.name.split('.').pop().toLowerCase();
  const icon = {pdf:'📄',docx:'📝',csv:'📊',xlsx:'📊',txt:'📃',md:'📃',png:'🖼',jpg:'🖼'}[ext]||'📎';
  const msgId = 'ingest_'+fileId;
  const fileInfo = {id:fileId, name:file.name, size:file.size, ext, workerId:operatorId, uploadedAt:Date.now(), stage:'uploading', chunks:0};
  await Vault.saveFile(fileInfo);

  if (!S.messages[operatorId]) S.messages[operatorId]=[];
  S.messages[operatorId].push({time:timeNow(), type:'agent', html:`
    <div class="ingest-progress" id="${msgId}">
      <div class="ingest-header"><span class="ingest-icon">${icon}</span><span class="ingest-name">${esc(file.name)}</span><span class="ingest-stage">UPLOADING</span></div>
      <div class="ingest-bar"><div class="ingest-bar__fill" style="width:5%"></div></div>
      <div class="ingest-stats"><span>Processing…</span></div>
    </div>`});
  renderMain(); scrollChat();

  const stagePct = {uploading:15,parsing:35,chunking:55,embedding:75,indexing:90,ready:100};
  for (const stage of INGEST_STAGES) {
    await new Promise(r=>setTimeout(r, 380+Math.random()*550));
    const el = document.getElementById(msgId);
    if (el) {
      el.querySelector('.ingest-stage').textContent = stage.toUpperCase();
      el.querySelector('.ingest-bar__fill').style.width = stagePct[stage]+'%';
      if (stage==='ready') el.querySelector('.ingest-stats').innerHTML = `<span>✓ ${Math.max(1,Math.floor(file.size/500))} chunks indexed</span><span>Scope: ${operatorId}</span>`;
    }
    fileInfo.stage = stage;
    if (stage==='indexing') fileInfo.chunks = Math.max(1,Math.floor(file.size/500));
    await Vault.saveFile(fileInfo);
  }
  S.messages[operatorId].push({time:timeNow(), type:'agent', text:`✓ ${file.name} ingested — ${fileInfo.chunks} chunks indexed and ready for RAG retrieval. Ask questions referencing this document.`});
  await Vault.saveMessages(operatorId, S.messages[operatorId]);
  await Vault.appendAuditEvent({id:'audit_'+Date.now(), ts:Date.now(), icon:'📁', action:`File ingested: ${file.name}`, actor:operatorId, time:timeNow()});
  renderMain(); scrollChat();
}

async function pollThoughts(id) {

  const fresh=thoughts.filter(t=>t.id>(_lastTIds[id]||0));

    let byWorker='';
    for (const cc of S.operators.filter(x=>!x.isBeacon)) {
      const wCost=(S.runs[cc.id]||[]).reduce((s,r)=>s+parseFloat(r.cost||0),0);
      byWorker+=`• ${cc.name}: $${wCost.toFixed(6)} (${(S.runs[cc.id]||[]).length} runs)\n`;
    }
    S.messages[id].push({time:t,type:'agent',text:`Cost Report (session)\n\n${byWorker||'• No runs yet\n'}\nTotal: $${totalCost.toFixed(6)}\n\n→ Observability for full metrics breakdown`});
    await Vault.saveMessages(id,S.messages[id]); renderMain(); scrollChat(); return;
  }

  S.messages[id].push({time:t,type:'agent',text:`Unknown command: ${cmd}`});
  renderMain(); scrollChat();
}

/* ═══ WORKER CARD ═══ */
function buildWorkerCard(data, id) {
  const st=data.state||{}, pr=data.progress||{}, isRun=st.status==='running';
  const dotC=isRun?'sc-dot--g':st.status==='stopped'?'sc-dot--r':'sc-dot--y';
  let progHTML='';
  if (pr.mode==='quantity'){const pct=Math.min(pr.pct||0,100);progHTML=`<div style="margin:8px 0 0"><div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--gray-500);margin-bottom:4px"><span>${pr.current||0}/${pr.target||0}</span><span>${pct.toFixed(1)}%</span></div><div class="mini-prog"><div class="mini-prog__fill" style="width:${pct}%"></div></div></div>`;}
  return `<div class="wsc"><div class="wsc-header"><div class="wsc-title"><span class="sc-dot ${dotC}"></span>${esc(id)}</div><span style="font-family:var(--mono);font-size:10px;color:var(--gray-500)">${(st.status||'idle').toUpperCase()}</span></div><div class="wsc-chips"><div class="wsc-chip"><div class="wsc-chip__val">${st.total_rows||0}</div><div class="wsc-chip__lbl">Rows</div></div><div class="wsc-chip"><div class="wsc-chip__val">${st.cycle||0}</div><div class="wsc-chip__lbl">Cycles</div></div><div class="wsc-chip"><div class="wsc-chip__val" style="font-size:12px">${st.model||S.model}</div><div class="wsc-chip__lbl">Model</div></div></div>${progHTML}<div class="wsc-actions"><button class="wsc-btn" onclick="toggleWorkerPanel('${id}')">📊 Panel</button><button class="wsc-btn wsc-btn--stop" onclick="doStopWorker('${id}')">⬛ Stop</button><button class="wsc-btn" onclick="window.open('${gwUrl(id)}')">↗ Dashboard</button></div></div>`;
}

/* ═══ SEND MESSAGE ═══ */
async function sendMsg(id, text) {
  const t=timeNow(), c=S.operators.find(x=>x.id===id);
  if (!S.messages[id]) S.messages[id]=[];
  if (text.startsWith('/')) { S.messages[id].push({time:t,type:'user',text}); renderMain(); scrollChat(); await handleCommand(id,text); return; }
  S.messages[id].push({time:t,type:'user',text});
  S.messages[id].push({time:t,type:'agent',text:'…',isStreaming:true});
  renderMain(); scrollChat();
  const history=S.messages[id].filter(m=>!m.isStreaming&&!m.html&&(m.type==='user'||m.type==='agent')).slice(-10).map(m=>({role:m.type==='user'?'user':'assistant',content:m.text}));
  if (id!=='beacon') createRun(id, text.slice(0,60));
  await GatewayContract.streamChat(history, S.model,
    (token,full)=>{ const last=S.messages[id]?.[S.messages[id].length-1]; if(last?.isStreaming){last.text=full;renderMain();scrollChat();} },
    async(full)=>{ const last=S.messages[id]?.[S.messages[id].length-1]; if(last?.isStreaming){last.text=full;delete last.isStreaming;} await Vault.saveMessages(id,S.messages[id]); renderMain(); scrollChat(); }
  );
}

        S.operators = opData.operators.map(op => ({

          name: op.name,
          role: op.category ? op.category.charAt(0).toUpperCase()+op.category.slice(1) : 'Operator',
          status: op.status === 'offline' ? 'offline' : op.op_status === 'production' ? 'active' : 'standby',
          model: S.model || '—',

        }));

    }

          id: a.id, runId: a.run_id, workerId: a.action_key || 'system',

function attachNodeDrag() {
  document.querySelectorAll('.flow-node').forEach(el => {
    let ox=0,oy=0,mx=0,my=0,dragging=false;
    const nodeId=el.getAttribute('data-node');
    el.addEventListener('mousedown', e=>{
      if (e.target.classList.contains('flow-node__port')) return;
      dragging=true; el.classList.add('flow-node--dragging');
      const node=S.studioNodes.find(n=>n.id===nodeId);
      ox=node.x; oy=node.y; mx=e.clientX; my=e.clientY;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e=>{
      if (!dragging)return;
      const node=S.studioNodes.find(n=>n.id===nodeId); if(!node)return;
      node.x=Math.max(0,ox+(e.clientX-mx));
      node.y=Math.max(0,oy+(e.clientY-my));
      el.style.left=node.x+'px'; el.style.top=node.y+'px';
      // Redraw SVG connections
      const svgEl=document.querySelector('.flow-svg'); if(svgEl) svgEl.innerHTML=buildConnSVG();
    });
    document.addEventListener('mouseup', e=>{
      if (!dragging)return; dragging=false;
      el.classList.remove('flow-node--dragging');
      selectNode(nodeId);
    });
    el.addEventListener('click', e=>{e.stopPropagation(); selectNode(nodeId);});
  });
}
function buildConnSVG() {
  const conns=[{from:'n1',to:'n2'},{from:'n2',to:'n3'},{from:'n3',to:'n4'},{from:'n2',to:'n5'}];
  return conns.map(c=>{
    const f=S.studioNodes?.find(n=>n.id===c.from), t=S.studioNodes?.find(n=>n.id===c.to);
    if(!f||!t)return'';
    const x1=f.x+(f.width||140),y1=f.y+30,x2=t.x,y2=t.y+30,cx=(x1+x2)/2;
    return `<path d="M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}" fill="none" stroke="var(--navy-300)" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  }).join('');
}

function copyContractSpec() {
  const spec=`PRISM Gateway Contract v1\n\nSystem\n  GET /api/status\n  GET /api/operators\n\nChat\n  POST /v1/chat/completions (SSE stream, OAI-compatible delta)\n\nModels\n  GET /api/models\n  POST /api/model/switch\n\nWorkers\n  GET /api/workers/:id/status  → {state:{status,total_rows,cycle,model,task_name},progress:{mode,pct,current,target},log_tail[]}\n  GET /api/workers/:id/thoughts → [{id,type,text,time}]\n  POST /api/workers/:id/stop\n  POST /api/workers/:id/command\n\nRuns\n  GET /api/runs\n  GET /api/runs/:id/events\n\nMetrics\n  GET /api/costs/summary\n  GET /api/metrics/summary\n\nApprovals\n  GET /approvals\n  POST /approvals/:id/approved\n  POST /approvals/:id/rejected`;

async function createApiKey() {
  const name=prompt('Key name (e.g. "Monitoring hook"):'); if(!name||!name.trim())return;
  const raw='zyr_sk_'+Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
  const key={id:'key_'+Date.now(), name:name.trim(), preview:'zyr_sk_••••'+raw.slice(-4), full:raw, created:new Date().toLocaleDateString()};
  await Vault.saveApiKey(key);
  await Vault.appendAuditEvent({id:'audit_'+Date.now(), ts:Date.now(), icon:'🔑', action:`API key created: ${name}`, actor:'admin', time:timeNow()});
  alert(`API key created:\n${raw}\n\nCopy this — it will not be shown again. Preview stored in vault.`);
  renderAdminSurface();
}
async function revokeKey(id) {
  if(!confirm('Revoke this API key? It will stop working immediately.'))return;
  // IndexedDB delete
  const keys=await Vault.loadApiKeys();
  const updated=keys.filter(k=>k.id!==id);
  // Clear and re-save
  const d=await (new Promise((res,rej)=>{const req=indexedDB.open('prism_vault_v3',1);req.onsuccess=e=>res(e.target.result);req.onerror=()=>rej();}));
  const tx=d.transaction('apiKeys','readwrite'); tx.objectStore('apiKeys').delete(id);
  await Vault.appendAuditEvent({id:'audit_'+Date.now(),ts:Date.now(),icon:'🔒',action:'API key revoked',actor:'admin',time:timeNow()});
  renderAdminSurface();
}

/* === LIVE RUN POLL — real data from Cascadia PRISM API every 3s === */
S.liveRuns = [];
S.liveApprovals = [];

async function pollLiveRuns() {
  const [rd, ad] = await Promise.all([
    prismFetch('/api/prism/runs').catch(() => null),
    prismFetch('/api/prism/approvals').catch(() => null),
  ]);
  let changed = false;
  if (rd && Array.isArray(rd.runs)) {
    if (JSON.stringify(rd.runs) !== JSON.stringify(S.liveRuns)) { S.liveRuns = rd.runs; changed = true; }
  }
  if (ad && Array.isArray(ad.approvals)) {
    if (JSON.stringify(ad.approvals) !== JSON.stringify(S.liveApprovals)) { S.liveApprovals = ad.approvals; changed = true; }
    ad.approvals.forEach(a => {
      if (!S.approvals.find(x => x.id === String(a.id))) {
        S.approvals.push({ id: String(a.id), workerId: 'bell', title: 'Email send approval',
          summary: 'Run: ' + a.run_id, payload: a.action_key || '', risk: 'medium',
          actionType: a.action_key || 'email.send', requiredRole: 'operator',
          status: 'pending', createdAt: Date.now() });
      }
    });
  }
  if (changed) {
    updateNavBadges();
    if (S.surface === 'runs')      renderRunsSurface();
    if (S.surface === 'approvals') renderApprovalsSurface();
  }
}

async function approveFromPrism(approvalId, decision) {
  try {
    await fetch(PRISM_URL + '/api/prism/approve', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({approval_id: approvalId, decision}),
      signal: AbortSignal.timeout(5000),
    });
  } catch(_) {}
  S.liveApprovals = S.liveApprovals.filter(a => a.id !== approvalId);
  const sa = S.approvals.find(x => x.id === String(approvalId));
  if (sa) sa.status = decision;
  updateNavBadges();
  renderApprovalsSurface();
  setTimeout(pollLiveRuns, 800);
}

async function refreshHealth() {
  try {
    const d = await prismFetch('/api/prism/health-check');
    if (!d) {
      const grid = document.getElementById('hgrid');
      const countEl = document.getElementById('hs-count');
      const labelEl = document.getElementById('hs-label');
      if (countEl) countEl.textContent = '—';
      if (labelEl) labelEl.textContent = 'PRISM not reachable';
      if (grid) grid.innerHTML = `
        <div class="hc-group">Connection</div>
        <div class="hc">
          <div class="hc-ico hc-err"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
          <div><div class="hc-lbl">PRISM Gateway</div>
          <div class="hc-det">Cannot reach backend — run: python3 -m cascadia.kernel.watchdog --config config.json</div></div>
          <span class="hc-badge hcb-err">Offline</span>
        </div>`;
      return;
    }
    const grid = document.getElementById('hgrid');
    const countEl = document.getElementById('hs-count');
    const labelEl = document.getElementById('hs-label');
    if (!grid) return;

    const okCount = Object.values(d.checks).filter(c=>c.status==='ok').length;
    const total = Object.values(d.checks).length;
    if (countEl) countEl.textContent = okCount+'/'+total;
    if (labelEl) labelEl.textContent = d.summary?.ready ? 'All systems operational' : okCount+'/'+total+' components ready';

    const groups = {};
    Object.values(d.checks).forEach(c => {
      if (!groups[c.group]) groups[c.group] = [];
      groups[c.group].push(c);
    });

    const icoOk   = `<div class="hc-ico hc-ok"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
    const icoWarn  = `<div class="hc-ico hc-warn"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M12 9v4M12 17h.01"/></svg></div>`;
    const icoErr   = `<div class="hc-ico hc-err"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>`;
    const icoSpin  = `<div class="hc-ico hc-spin"></div>`;

    grid.innerHTML = Object.entries(groups).map(([grp, checks]) => `
      <div class="hc-group">${grp}</div>
      ${checks.map(c => {
        const ico   = c.status==='ok'?icoOk:c.status==='warning'?icoWarn:c.status==='error'?icoErr:icoSpin;
        const cls   = c.status==='ok'?'ok':c.status==='warning'?'warn':c.status==='error'?'err':'spin';
        const lbl   = c.status==='ok'?'Ready':c.status==='warning'?'Warning':c.status==='error'?'Error':'Checking';
        return `<div class="hc">${ico}<div><div class="hc-lbl">${c.label}</div><div class="hc-det">${c.detail||''}</div></div><span class="hc-badge hcb-${cls}">${lbl}</span></div>`;
      }).join('')}
    `).join('');
  } catch(e) { console.error('refreshHealth error:', e); }
}

function toggleAlmanac() {
  const ov = document.getElementById('alm-overlay');
  if (!ov) return;
  ov.classList.toggle('open');
  if (ov.classList.contains('open')) document.getElementById('alm-input')?.focus();
}

async function sendAlmanac() {
  const input = document.getElementById('alm-input');
  const msgs  = document.getElementById('alm-msgs');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  msgs.innerHTML += `<div class="alm-msg-user">${q}</div>`;
  const typingId = 'alm-typing-' + Date.now();
  msgs.innerHTML += `<div class="alm-typing" id="${typingId}"><span></span><span></span><span></span></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  try {
    // PRISM proxies Almanac at /api/prism/almanac — same origin, no CORS
    const res = await fetch(window.location.origin + '/api/prism/almanac', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: q, context: 'prism_ui'})
    });
    const data = await res.json();
    document.getElementById(typingId)?.remove();
    msgs.innerHTML += `<div class="alm-msg-ai">${data.answer||data.error||'No results found.'}</div>`;
  } catch(e) {
    document.getElementById(typingId)?.remove();
    msgs.innerHTML += `<div class="alm-msg-ai">Could not reach ALMANAC (${e.message}). Make sure Cascadia is running: <strong>bash start.sh</strong></div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function termConnect() {
  if (_termWs) { try { _termWs.close(); } catch(_) {} }
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${wsProto}//${location.host}/ws/terminal`;
  try {
    _termWs = new WebSocket(wsUrl);
    _termWs.onopen = () => {
      termSetStatus(true);
      termPrint('system', 'Connected. Type commands below.');
    };
    _termWs.onmessage = (e) => {
      termPrint('output', e.data);
    };
    _termWs.onerror = () => {
      termSetStatus(false);
      termPrint('error', 'WebSocket endpoint not available (/ws/terminal returns 404).');
      termPrint('system', 'Terminal requires WebSocket support in cascadia/dashboard/prism.py.');
      termPrint('system', 'Running in local echo mode — type "help" for available commands.');
    };
    _termWs.onclose = () => {
      termSetStatus(false);
    };
  } catch(e) {
    termSetStatus(false);
    termPrint('error', 'Could not open WebSocket: ' + e.message);
    termPrint('system', 'Running in local echo mode.');
  }
}

function termSetStatus(online) {
  const el = document.getElementById('term-ws-status');
  if (!el) return;
  el.textContent = online ? '● connected' : '● disconnected';
  el.className = 'term-ws-badge ' + (online ? 'term-ws-badge--on' : 'term-ws-badge--off');
}

function termPrint(type, text) {
  const screen = document.getElementById('term-screen');
  if (!screen) return;
  const line = document.createElement('div');
  line.className = 'term-line term-line--' + type;
  // Basic ANSI stripping for safety
  line.textContent = text.replace(/\x1b\[[0-9;]*m/g, '');
  screen.appendChild(line);
  screen.scrollTop = screen.scrollHeight;
}

function termInputChange(val) { _termInput = val; }

function termKeydown(e) {
  const input = document.getElementById('term-input');
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    if (!cmd) return;
    termPrint('cmd', 'cascadia$ ' + cmd);
    _termHistory.unshift(cmd);
    _termHistIdx = -1;
    input.value = '';
    _termInput = '';
    if (_termWs && _termWs.readyState === WebSocket.OPEN) {
      _termWs.send(JSON.stringify({cmd}));
    } else {
      // Local echo fallback with basic built-ins
      termLocalExec(cmd);
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (_termHistory.length) {
      _termHistIdx = Math.min(_termHistIdx + 1, _termHistory.length - 1);
      input.value = _termHistory[_termHistIdx] || '';
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    _termHistIdx = Math.max(_termHistIdx - 1, -1);
    input.value = _termHistIdx >= 0 ? (_termHistory[_termHistIdx] || '') : '';
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault(); termClear();
  }
}

function termLocalExec(cmd) {
  const c = cmd.trim().toLowerCase();
  if (c === 'clear' || c === 'cls') { termClear(); return; }
  if (c === 'help') {
    termPrint('system', 'Cascadia OS — Command Reference');
    termPrint('output', '');
    termPrint('output', 'STARTUP');
    termPrint('output', '  bash start.sh                    — start all Cascadia services');
    termPrint('output', '  bash stop.sh                     — stop all services gracefully');
    termPrint('output', '  bash demo.sh                     — run operator demo');
    termPrint('output', '');
    termPrint('output', 'RUNTIME');
    termPrint('output', '  python3 -m cascadia.kernel.watchdog --config config.json');
    termPrint('output', '                                   — start watchdog directly');
    termPrint('output', '  cat data/logs/flint.log          — tail watchdog log');
    termPrint('output', '  bash setup-llm.sh                — download and install AI model');
    termPrint('output', '');
    termPrint('output', 'HEALTH CHECKS');
    termPrint('output', '  curl -s localhost:6300/api/prism/health-check | python3 -m json.tool');
    termPrint('output', '  curl -s localhost:6300/api/prism/hardware     | python3 -m json.tool');
    termPrint('output', '  curl -s localhost:6300/api/prism/overview     | python3 -m json.tool');
    termPrint('output', '');
    termPrint('output', 'PORTS');
    termPrint('output', '  5100 CREW  · 5101 VAULT  · 5102 SENTINEL · 5103 CURTAIN');
    termPrint('output', '  6200 BEACON · 6201 STITCH · 6202 VANGUARD · 6203 HANDSHAKE');
    termPrint('output', '  6204 BELL  · 6205 ALMANAC · 6300 PRISM');
    termPrint('output', '');
    termPrint('output', 'TERMINAL');
    termPrint('output', '  clear / cls                      — clear terminal');
    termPrint('output', '  help                             — show this reference');
    return;
  }
  if (c === 'clear' || c === 'cls') { termClear(); return; }
  // Try to give useful feedback for common commands
  if (c.startsWith('curl') || c.startsWith('cat ') || c.startsWith('bash ') || c.startsWith('python')) {
    termPrint('error', 'Live shell not available — copy this command to your Terminal app.');
    termPrint('system', 'WebSocket terminal support is on the roadmap for Cascadia v0.5.');
    return;
  }
  termPrint('error', 'Unknown command: ' + cmd.split(' ')[0] + '. Type "help" for reference.');
}

async function renderSettingsSurface() {
  const panel = document.getElementById('main-panel');
  panel.innerHTML = `<div class="settings-wrap"><div style="font-size:15px;font-weight:700;color:var(--navy-800);margin-bottom:20px">Settings</div><div id="settings-body"><div style="font-size:12px;color:var(--text-dim)">Loading...</div></div></div>`;
  // Fetch hardware + current settings in parallel
  const [hwR, setR] = await Promise.all([
    prismFetch('/api/prism/hardware'),
    prismFetch('/api/prism/settings'),
  ]);

  // Client-side hardware fallback when backend not available
  let hw = hwR;
  if (!hw) {
    // RAM: try JS heap estimate first (Chrome), then deviceMemory (capped at 8 by spec, just a hint)
    let ramGB = null;
    try {
      // performance.memory.jsHeapSizeLimit gives ~half total RAM on Chrome
      if (performance?.memory?.jsHeapSizeLimit) {
        const heapLimit = performance.memory.jsHeapSizeLimit / (1024**3);
        // heap limit is ~50% of physical RAM; round to nearest common size
        const est = heapLimit * 2;
        ramGB = [4,8,16,24,32,64].reduce((a,b) => Math.abs(b-est) < Math.abs(a-est) ? b : a);
      }
    } catch(_) {}
    if (!ramGB) {
      // deviceMemory is capped at 8 by browsers but still useful as floor
      const dm = navigator.deviceMemory;
      ramGB = dm ? Math.max(dm, 8) : null; // treat as minimum
    }

    let gpuType = 'cpu_only', gpuLabel = 'Unknown';
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (gl) {
        const dbgInfo = gl.getExtension('WEBGL_debug_renderer_info');
        const renderer = dbgInfo ? gl.getParameter(dbgInfo.UNMASKED_RENDERER_WEBGL) : '';
        if (/apple/i.test(renderer))           { gpuType='apple_silicon'; gpuLabel='Apple Silicon — Metal GPU'; }
        else if (/nvidia/i.test(renderer))     { gpuType='nvidia';        gpuLabel='NVIDIA GPU — CUDA'; }
        else if (/amd|radeon/i.test(renderer)) { gpuType='amd';           gpuLabel='AMD GPU — ROCm'; }
        else if (renderer)                     { gpuLabel = renderer.slice(0,40); }
      }
    } catch(_) {}

    const rec = (ramGB||0) >= 16 ? '14b' : (ramGB||0) >= 8 ? '7b' : '3b';
    hw = { ram_gb: ramGB, gpu_type: gpuType, gpu_label: gpuLabel, rec_model: rec, _clientDetected: true };
  }

  _hw = hw;
  const llm = setR?.llm || {};
  // Pre-select current values
  _settingsMode  = llm.provider === 'openai'||llm.provider==='anthropic'||llm.provider==='groq' ? 'api'
                 : llm.provider === 'ollama' ? 'ollama' : 'local';
  _settingsModel = llm.active_model_id?.replace('qwen2.5-','') || hw?.rec_model || '3b';
  _settingsProv  = llm.provider && ['openai','anthropic','groq'].includes(llm.provider) ? llm.provider : 'openai';
  _renderSettingsBody(hw, llm);
}

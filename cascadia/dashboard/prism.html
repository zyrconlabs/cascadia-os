                onclick="${dim?'void(0)':'selModel(this.dataset.mid)'}">
                <input type="radio" name="mdl" ${_settingsModel===m.id?'checked':''}${dim?' disabled':''}>
                <div><div class="model-opt-name">${m.n}${isRec?'<span class="rec-chip">Rec</span>':''}</div>
                  <div class="model-opt-desc">${m.d}${dim?' — needs '+m.r+'GB RAM':''}</div></div>
                <div><div class="model-opt-size">${m.sz}</div><div class="model-opt-ram">${m.r}GB min</div></div>
              </label>`;
            }).join('')}
          </div>
        </div>

        <!-- API: provider + key -->
        <div id="sec-api" style="${_settingsMode==='api'?'':'display:none'}">
          <div class="prov-tabs" style="flex-wrap:wrap">
            <button class="ptab ${_settingsProv==='openai'?'on':''}"     onclick="selProv('openai',this)">OpenAI</button>
            <button class="ptab ${_settingsProv==='anthropic'?'on':''}"  onclick="selProv('anthropic',this)">Anthropic</button>
            <button class="ptab ${_settingsProv==='groq'?'on':''}"       onclick="selProv('groq',this)">Groq</button>
            <button class="ptab ${_settingsProv==='gemini'?'on':''}"     onclick="selProv('gemini',this)">Gemini</button>
            <button class="ptab ${_settingsProv==='lmstudio'?'on':''}"   onclick="selProv('lmstudio',this)">LM Studio</button>
            <button class="ptab ${_settingsProv==='other'?'on':''}"      onclick="selProv('other',this)">Other</button>
          </div>
          <input class="settings-input" id="api-key-inp" type="password"
            placeholder="API key" value="${llm.api_key||''}" oninput="chkApiKey()">
          <input class="settings-input" id="api-model-inp" type="text"
            placeholder="Model (e.g. gpt-4o-mini)" value="${llm.model||'gpt-4o-mini'}">
          <div id="api-base-row" style="${['lmstudio','other'].includes(_settingsProv)?'':'display:none'}">
            <input class="settings-input" id="api-base-inp" type="text"
              placeholder="Base URL (e.g. http://localhost:1234/v1)" value="${llm.api_base||''}">
          </div>
          <div style="font-size:10px;color:var(--text-dim);margin-bottom:10px" id="api-key-link">
            Get key: platform.openai.com/api-keys
          </div>
        </div>

        <!-- Ollama — always shown, not gated on detected models -->
        <div id="sec-ollama" style="${_settingsMode==='ollama'?'':'display:none'}">
          ${hw?.ollama_models?.length
            ? `<select class="settings-input" id="ollama-sel">
                ${hw.ollama_models.map(m=>`<option value="${m}" ${m===llm.model?'selected':''}>${m}</option>`).join('')}
               </select>
               <div style="font-size:10px;color:var(--text-dim);margin-bottom:10px">Models detected on your machine via Ollama</div>`
            : `<input class="settings-input" id="ollama-sel" type="text"
                placeholder="Model name (e.g. llama3.2, mistral)" value="${llm.model||''}">
               <div style="font-size:10px;color:var(--text-dim);margin-bottom:10px">
                 No models detected. Make sure Ollama is running: <strong>ollama serve</strong>
               </div>`
          }
        </div>
      </div>
    </div>

    <button class="settings-save-btn" id="save-btn" onclick="saveSettings()">
      Save & Apply
    </button>
    <div id="save-status" style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px;min-height:16px"></div>
  `;
}

function selMode(m) {
  _settingsMode = m;
  document.querySelectorAll('.mode-opt').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('sec-local').style.display   = m==='local'    ? '' : 'none';
  document.getElementById('sec-api').style.display     = m==='api'      ? '' : 'none';
  document.getElementById('sec-ollama').style.display  = (m==='ollama'||m==='lmstudio') ? '' : 'none';
  // LM Studio uses the ollama section but with text input and different label
  if (m==='lmstudio') {
    _settingsMode = 'lmstudio';
    const inp = document.getElementById('ollama-sel');
    if (inp) { inp.placeholder = 'Model name (e.g. llama-3.2-1b-instruct)'; }
  }
}

function selModel(id) {
  _settingsModel = id;
  document.querySelectorAll('.model-opt:not(.disabled)').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

const PROVD = {
  openai:    { m:'gpt-4o-mini',                      l:'platform.openai.com/api-keys',    base:'' },
  anthropic: { m:'claude-haiku-4-5-20251001',         l:'console.anthropic.com/keys',      base:'' },
  groq:      { m:'llama-3.3-70b-versatile',           l:'console.groq.com/keys',           base:'' },
  gemini:    { m:'gemini-2.0-flash',                  l:'aistudio.google.com/apikey',      base:'https://generativelanguage.googleapis.com/v1beta/openai' },
  lmstudio:  { m:'local-model',                       l:'No key needed — LM Studio is local', base:'http://localhost:1234/v1' },
  other:     { m:'',                                  l:'Check your provider\'s docs',     base:'' },
};

function selProv(p, btn) {
  _settingsProv = p;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const mdlEl  = document.getElementById('api-model-inp');
  const lnkEl  = document.getElementById('api-key-link');
  const baseRow = document.getElementById('api-base-row');
  const baseInp = document.getElementById('api-base-inp');
  if (mdlEl && PROVD[p].m) mdlEl.value = PROVD[p].m;
  if (lnkEl) lnkEl.textContent = PROVD[p].l;
  const showBase = ['lmstudio','other','gemini'].includes(p);
  if (baseRow) baseRow.style.display = showBase ? '' : 'none';
  if (baseInp && PROVD[p].base && !baseInp.value) baseInp.value = PROVD[p].base;
}
function chkApiKey() {}

async function saveSettings() {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true; btn.textContent = 'Saving...';

  let payload = { provider: _settingsMode === 'api'      ? _settingsProv
                            : _settingsMode === 'ollama'   ? 'ollama'
                            : _settingsMode === 'lmstudio' ? 'lmstudio'
                            : 'llamacpp' };

  if (_settingsMode === 'local') {
    const MFILES = {'3b':'qwen2.5-3b-instruct-q4_k_m.gguf',
                    '7b':'qwen2.5-7b-instruct-q4_k_m.gguf',
                    '14b':'Qwen2.5-14B-Instruct-Q4_K_M.gguf'};
    payload.model = MFILES[_settingsModel] || MFILES['3b'];
    payload.model_size = _settingsModel;
  } else if (_settingsMode === 'api') {
    payload.model    = document.getElementById('api-model-inp')?.value || PROVD[_settingsProv]?.m || '';
    payload.api_key  = document.getElementById('api-key-inp')?.value || '';
    const baseVal    = document.getElementById('api-base-inp')?.value || '';
    if (baseVal) payload.api_base = baseVal;
  } else if (_settingsMode === 'ollama') {
    payload.model = document.getElementById('ollama-sel')?.value || '';
  } else if (_settingsMode === 'lmstudio') {
    payload.model    = document.getElementById('ollama-sel')?.value || 'local-model';
    payload.api_base = 'http://localhost:1234/v1';
  }

  try {
    const r = await fetch('/api/prism/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (d.ok) {
      status.textContent = d.setup_running
        ? 'Saved. Installing AI model in background...'
        : 'Saved successfully.';
      btn.textContent = '✓ Saved';
      // Switch to health tab after short delay
      setTimeout(() => switchSurface('health'), 1200);
    } else {
      status.textContent = 'Error: ' + (d.error || 'unknown');
      btn.disabled = false; btn.textContent = 'Save & Apply';
    }
  } catch(e) {
    status.textContent = 'Could not save — check logs';
    btn.disabled = false; btn.textContent = 'Save & Apply';
  }
}

/* ── HANDLE URL HASH ON LOAD ── */
function maybeOpenHealth() {
  const hash = window.location.hash.replace('#','');
  const valid = ['ops','health','settings','terminal','runs','approvals','studio','admin'];
  if (valid.includes(hash)) {
